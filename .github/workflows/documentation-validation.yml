---
name: Documentation Validation

on:
  push:
    branches: [main]
    paths:
      - "documentation/**"
      - ".github/actions/validate-documents/**"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "documentation/**"
      - ".github/actions/validate-documents/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  validate-architecture:
    name: Validate Architecture Documents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate architecture documents
        uses: ./.github/actions/validate-documents
        with:
          documents-dir: documentation
          doc-type: architecture

  validate-design:
    name: Validate Design Documents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate design documents
        uses: ./.github/actions/validate-documents
        with:
          documents-dir: documentation
          doc-type: design

  validate-theory:
    name: Validate Theory Documents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate theory documents
        uses: ./.github/actions/validate-documents
        with:
          documents-dir: documentation
          doc-type: theory
