---
name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write
  packages: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  GTEST_COLOR: 1

jobs:
  host_build_test_ubuntu:
    name: Host Build & Test (ubuntu-latest)
    runs-on: ubuntu-latest
    container: gabrielfrasantos/embedded-devcontainer-cpp:v7.2.0@sha256:e8a23c738637da0009ab5f9d73488c5e27e6309d4f577082368dacfab49d0cf5
    steps:
      - name: Configure Git
        run: |
          git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add safe.directory '*'
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive
      - uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: ${{ github.job }}-ubuntu-latest
          max-size: 2G
          save: ${{ github.ref == 'refs/heads/main' }}
      - uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
        with:
          configurePreset: "host"
          buildPreset: "host-Debug-WithPackage"
          testPreset: "host"
      - name: Run SIL integration tests
        run: |
          sil_test=$(find build/host -name "e_foc.integration_tests" -type f -executable -print -quit)
          if [[ -z "$sil_test" ]]; then
            echo "::error::SIL integration test executable not found"
            exit 1
          fi
          $sil_test --format summary pretty junit:sil-test-report.xml -- integration_tests/software_in_the_loop/features
      - name: Generate SIL test summary
        if: always()
        run: |
          if [[ ! -f sil-test-report.xml ]]; then
            {
              echo "## SIL Integration Test Results"
              echo ""
              echo "_Report not generated — SIL test step did not produce output._"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "## SIL Integration Test Results"
            echo ""
            python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('sil-test-report.xml')
          root = tree.getroot()
          suites = root.findall('.//testsuite') if root.tag == 'testsuites' else [root]
          features = {}
          for suite in suites:
              for tc in suite.findall('testcase'):
                  feature = tc.get('classname', 'Unknown')
                  name = tc.get('name', 'Unknown')
                  failed = tc.find('failure') is not None
                  skipped = tc.find('skipped') is not None
                  status = ':x:' if failed else ':zzz:' if skipped else ':white_check_mark:'
                  features.setdefault(feature, []).append((name, status))
          for feature, scenarios in features.items():
              print(f'### {feature}')
              print('| Scenario | Status |')
              print('|---|---|')
              for name, status in scenarios:
                  print(f'| {name} | {status} |')
              print()
          "
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        if: always()
        with:
          check_name: SIL Integration Test Results
          comment_title: SIL Integration Test Results
          files: sil-test-report.xml
          report_individual_runs: true
          report_suite_logs: info
      - name: Upload SIL test report
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sil-test-report
          path: sil-test-report.xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e_foc
          path: build/host/e_foc-*-Linux.tar.gz
          if-no-files-found: error
      - name: Upload test logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-logs
          path: build/host/Testing/Temporary/
  host_cross_windows:
    name: Host Cross-Compile (Linux → Windows)
    runs-on: ubuntu-latest
    container: gabrielfrasantos/embedded-devcontainer-cpp:v7.2.0@sha256:e8a23c738637da0009ab5f9d73488c5e27e6309d4f577082368dacfab49d0cf5
    steps:
      - name: Configure Git
        run: |
          git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add safe.directory '*'
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive
      - name: Cache ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ${{ github.job }}-windows-cross-${{ github.sha }}
          restore-keys: ${{ github.job }}-windows-cross-
      - name: Cross-compile for Windows
        run: cmake --preset windows && cmake --build --preset windows-RelWithDebInfo
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e_foc-windows
          path: build/windows/**/*.exe
          if-no-files-found: warn
  embedded_build:
    name: Embedded Build
    runs-on: ubuntu-latest
    container: gabrielfrasantos/embedded-devcontainer-cpp:v7.2.0@sha256:e8a23c738637da0009ab5f9d73488c5e27e6309d4f577082368dacfab49d0cf5
    needs: [host_build_test_ubuntu, host_cross_windows]
    strategy:
      matrix:
        configuration: ["RelWithDebInfo"]
        target:
          [
            "EK-TM4C1294XL",
            "EK-TM4C123GXL",
            "STM32F407G-DISC1",
            "NUCLEO-H563ZI"
          ]
    steps:
      - name: Configure Git
        run: |
          git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN  }}@github.com/".insteadOf "https://github.com/"
          git config --global --add safe.directory '*'
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive
      - uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: ${{ matrix.configuration }}-${{ matrix.target }}
          max-size: 2G
          save: ${{ github.ref == 'refs/heads/main' }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: e_foc
      - run: tar -zxvf e_foc-*.tar.gz
      - run: mkdir install && mv e_foc-*/* install/
      - uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
        with:
          configurePreset: ${{ matrix.target }}
          buildPreset: ${{ matrix.target }}-${{ matrix.configuration }}
      - name: Run cycle analysis
        if: matrix.target == 'EK-TM4C1294XL'
        uses: embedded-pro/cortex-cycle-budget@de7fc1f448138bf1ee96f03d46d8a675023b6008 # v0.2.2
        with:
          comment-marker: '<!-- cycle-analysis-comment -->'
          analyses-json: |
            [
              {
                "label": "Worst case (position)",
                "elf_path": "build/${{ matrix.target }}/targets/sync_foc_sensored/main/${{ matrix.configuration }}/e_foc.sync_foc_sensored.main.elf",
                "config_path": "targets/sync_foc_sensored/main/cycle-analysis.json",
                "output_dir": "cycle-analysis"
              }
            ]
          target: ${{ matrix.target }}
          build-config: ${{ matrix.configuration }}
          clock-mhz: "120"
          cortex: "m4"
          output-dir: cycle-analysis
          post-comment: "true"
          artifact-name: cycle-analysis
      - name: Cycle analysis summary
        if: matrix.target == 'EK-TM4C1294XL'
        run: cat cycle-analysis/combined_step_summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Run memory analysis
        if: matrix.target == 'EK-TM4C1294XL'
        uses: embedded-pro/cortex-memory-budget@cc5057b824ad7a5c340dfa6a3c8d22be0b89b35c
        with:
          comment-marker: '<!-- memory-analysis-comment -->'
          analyses-json: |
            [
              {
                "label": "Unified binary",
                "elf_path": "build/${{ matrix.target }}/targets/sync_foc_sensored/main/${{ matrix.configuration }}/e_foc.sync_foc_sensored.main.elf",
                "config_path": "targets/sync_foc_sensored/main/memory-analysis.json",
                "linker_script": "infra/hal/ti/tiva/ldscripts/mem_tm4c1294ncpdt.ld",
                "output_dir": "memory-analysis"
              }
            ]
          target: ${{ matrix.target }}
          build-config: ${{ matrix.configuration }}
          cortex: "m4"
          output-dir: memory-analysis
          post-comment: "true"
          artifact-name: memory-analysis
      - name: Memory analysis summary
        if: matrix.target == 'EK-TM4C1294XL'
        run: cat memory-analysis/combined_step_summary.md >> "$GITHUB_STEP_SUMMARY"
