---
name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  GTEST_COLOR: 1

jobs:
  host_build_test_ubuntu:
    name: Host Build & Test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git
        run: |
          git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add safe.directory '*'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - uses: hendrikmuhs/ccache-action@33522472633dbd32578e909b315f5ee43ba878ce # v1.2.22
        with:
          key: ${{ github.job }}-ubuntu-latest
          max-size: 2G
          save: ${{ github.ref == 'refs/heads/main' }}
      - uses: seanmiddleditch/gha-setup-ninja@3b1f8f94a2f8254bd26914c4ab9474d4f0015f67 # v6
      - name: Install Qt6
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends qt6-base-dev libgl1-mesa-dev
      - uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
        with:
          configurePreset: "host"
          buildPreset: "host-Debug-WithPackage"
          testPreset: "host"
          configurePresetAdditionalArgs: "['-DCMAKE_C_COMPILER_LAUNCHER=ccache', '-DCMAKE_CXX_COMPILER_LAUNCHER=ccache']"
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e_foc
          path: build/host/e_foc-*-Linux.tar.gz
          if-no-files-found: error
      - name: Upload test logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-logs
          path: build/host/Testing/Temporary/
  host_build_test:
    name: Host Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Configure Git
        run: |
          git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN  }}@github.com/".insteadOf "https://github.com/"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - uses: hendrikmuhs/ccache-action@33522472633dbd32578e909b315f5ee43ba878ce # v1.2.22
        with:
          key: ${{ github.job }}-${{ matrix.os }}
          max-size: 2G
          save: ${{ github.ref == 'refs/heads/main' }}
      - uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
        with:
          configurePreset: "host-single-Debug"
          buildPreset: "host-single-Debug"
          testPreset: "host-single-Debug"
          configurePresetAdditionalArgs: "['-DCMAKE_C_COMPILER_LAUNCHER=ccache', '-DCMAKE_CXX_COMPILER_LAUNCHER=ccache']"
      - name: Upload test logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-logs
          path: build/host/Testing/Temporary/
  embedded_build:
    name: Embedded Build
    runs-on: ubuntu-latest
    needs: [host_build_test_ubuntu, host_build_test]
    strategy:
      matrix:
        configuration: ["RelWithDebInfo"]
        gcc: ["13.2.Rel1"]
        target:
          [
            "EK-TM4C1294XL",
            "EK-TM4C123GXL",
            "STM32F407G-DISC1",
            "NUCLEO-H563ZI"
          ]
    steps:
      - name: Configure Git
        run: |
          git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN  }}@github.com/".insteadOf "https://github.com/"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install GNU Arm Embedded Toolchain ${{ matrix.gcc }}
        uses: carlosperate/arm-none-eabi-gcc-action@7153327ecfbc421a0b4268058e4bb3d5d6e5df2c # v1.12.1
        with:
          release: ${{ matrix.gcc }}
      - run: sudo apt-get update && sudo apt-get install ninja-build xsltproc
      - uses: hendrikmuhs/ccache-action@33522472633dbd32578e909b315f5ee43ba878ce # v1.2.22
        with:
          key: ${{ matrix.gcc }}-${{ matrix.configuration }}-${{ matrix.target }}
          max-size: 2G
          save: ${{ github.ref == 'refs/heads/main' }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: e_foc
      - run: tar -zxvf e_foc-*.tar.gz
      - run: mkdir install && mv e_foc-*/* install/
      - uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
        with:
          configurePreset: ${{ matrix.target }}
          buildPreset: ${{ matrix.target }}-${{ matrix.configuration }}
          configurePresetAdditionalArgs: "['-DCMAKE_C_COMPILER_LAUNCHER=ccache', '-DCMAKE_CXX_COMPILER_LAUNCHER=ccache']"
      - name: Run cycle analysis — torque
        if: matrix.target == 'EK-TM4C1294XL'
        uses: ./.github/actions/cycle-analysis
        id: cycles-torque
        with:
          elf-path: build/${{ matrix.target }}/targets/sync_foc_sensored/torque/main/${{ matrix.configuration }}/e_foc.sync_foc_sensored.torque.main.elf
          config-path: targets/sync_foc_sensored/torque/cycle-analysis.json
          target: ${{ matrix.target }}
          build-config: ${{ matrix.configuration }}
          clock-mhz: '120'
          cortex: 'm4'
          output-dir: cycle-analysis-torque
          post-pr-comment: 'false'
          artifact-name: cycle-analysis-torque
      - name: Run cycle analysis — speed
        if: matrix.target == 'EK-TM4C1294XL'
        uses: ./.github/actions/cycle-analysis
        id: cycles-speed
        with:
          elf-path: build/${{ matrix.target }}/targets/sync_foc_sensored/speed/main/${{ matrix.configuration }}/e_foc.sync_foc_sensored.speed.main.elf
          config-path: targets/sync_foc_sensored/speed/cycle-analysis.json
          target: ${{ matrix.target }}
          build-config: ${{ matrix.configuration }}
          clock-mhz: '120'
          cortex: 'm4'
          output-dir: cycle-analysis-speed
          post-pr-comment: 'false'
          artifact-name: cycle-analysis-speed
      - name: Run cycle analysis — position
        if: matrix.target == 'EK-TM4C1294XL'
        uses: ./.github/actions/cycle-analysis
        id: cycles-position
        with:
          elf-path: build/${{ matrix.target }}/targets/sync_foc_sensored/position/main/${{ matrix.configuration }}/e_foc.sync_foc_sensored.position.main.elf
          config-path: targets/sync_foc_sensored/position/cycle-analysis.json
          target: ${{ matrix.target }}
          build-config: ${{ matrix.configuration }}
          clock-mhz: '120'
          cortex: 'm4'
          output-dir: cycle-analysis-position
          post-pr-comment: 'false'
          artifact-name: cycle-analysis-position
      - name: Cycle analysis summary
        if: matrix.target == 'EK-TM4C1294XL'
        run: |
          {
            echo "## Cycle Analysis Results"
            echo ""
            echo "### Torque mode"
            echo "- **Min cycles**: ${{ steps.cycles-torque.outputs.min-cycles }}"
            echo "- **Max cycles**: ${{ steps.cycles-torque.outputs.max-cycles }}"
            echo ""
            cat cycle-analysis-torque/cycle_estimation_report.md
            echo ""
            echo "### Speed mode"
            echo "- **Min cycles**: ${{ steps.cycles-speed.outputs.min-cycles }}"
            echo "- **Max cycles**: ${{ steps.cycles-speed.outputs.max-cycles }}"
            echo ""
            cat cycle-analysis-speed/cycle_estimation_report.md
            echo ""
            echo "### Position mode (worst case)"
            echo "- **Min cycles**: ${{ steps.cycles-position.outputs.min-cycles }}"
            echo "- **Max cycles**: ${{ steps.cycles-position.outputs.max-cycles }}"
            echo ""
            cat cycle-analysis-position/cycle_estimation_report.md
          } | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Post combined cycle analysis PR comment
        if: matrix.target == 'EK-TM4C1294XL' && github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const torque  = fs.readFileSync('cycle-analysis-torque/cycle_estimation_report.md',   'utf8');
            const speed   = fs.readFileSync('cycle-analysis-speed/cycle_estimation_report.md',    'utf8');
            const pos     = fs.readFileSync('cycle-analysis-position/cycle_estimation_report.md', 'utf8');

            const marker = '<!-- cycle-analysis-comment -->';
            const body = [
              marker,
              '## Cycle Analysis Results',
              '',
              '### Torque mode',
              torque,
              '',
              '### Speed mode',
              speed,
              '',
              '### Position mode (worst case)',
              pos,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
