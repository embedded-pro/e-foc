---
name: Create Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 2

jobs:
  release_please:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: token
        with:
          app-id: ${{ vars.FOREST_RELEASER_APP_ID }}
          private-key: ${{ secrets.FOREST_RELEASER_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          token: ${{ steps.token.outputs.token }}

  build_linux_tools:
    name: Build Linux Tools
    needs: release_please
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git
        run: |
          git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add safe.directory '*'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - uses: seanmiddleditch/gha-setup-ninja@3b1f8f94a2f8254bd26914c4ab9474d4f0015f67 # v6
      - name: Install Qt6
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends qt6-base-dev libgl1-mesa-dev
      - uses: lukka/run-cmake@af1be47fd7c933593f687731bc6fdbee024d3ff4 # v10.8
        with:
          configurePreset: "host"
          buildPreset: "host-Release-WithPackage"
      - name: Package simulator
        run: |
          version="${{ needs.release_please.outputs.tag_name }}"
          staging="staging/simulator"
          mkdir -p "$staging"
          find build/host/source/tool/simulator -name "e_foc.tool.simulator.*" -type f -executable | while read -r f; do
            cp "$f" "$staging/"
          done
          cp source/tool/simulator/config/*.json "$staging/" 2>/dev/null || true
          tar -czf "e_foc-simulator-${version}-linux-x86_64.tar.gz" -C staging simulator
      - name: Package CAN Commander
        run: |
          version="${{ needs.release_please.outputs.tag_name }}"
          staging="staging/can_commander"
          mkdir -p "$staging"
          find build/host/source/tool/can_commander -name "e_foc.tool.can_commander" -type f -executable | while read -r f; do
            cp "$f" "$staging/"
          done
          tar -czf "e_foc-can_commander-${version}-linux-x86_64.tar.gz" -C staging can_commander
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: linux-simulator
          path: e_foc-simulator-*-linux-x86_64.tar.gz
          if-no-files-found: error
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: linux-can-commander
          path: e_foc-can_commander-*-linux-x86_64.tar.gz
          if-no-files-found: error
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: host-install-package
          path: build/host/e_foc-*.*
          if-no-files-found: error

  build_windows_tools:
    name: Build Windows Tools
    needs: release_please
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: windows-latest
    steps:
      - name: Configure Git
        run: |
          git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - uses: seanmiddleditch/gha-setup-ninja@3b1f8f94a2f8254bd26914c4ab9474d4f0015f67 # v6
      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.*"
          cache: true
      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_COMPILE_WARNING_AS_ERROR=On
          -DE_FOC_TARGET_PLATFORM=Host
          -DE_FOC_BUILD_SIMULATOR=On
          -DE_FOC_BUILD_TESTS=Off
          -DNUMERICAL_TOOLBOX_ENABLE_OPTIMIZATIONS=Off
      - name: Build
        run: cmake --build build
      - name: Package simulator
        shell: bash
        run: |
          version="${{ needs.release_please.outputs.tag_name }}"
          staging="staging/simulator"
          mkdir -p "$staging"
          find build/source/tool/simulator -name "e_foc.tool.simulator.*.exe" -type f | while read -r f; do
            cp "$f" "$staging/"
          done
          cp source/tool/simulator/config/*.json "$staging/" 2>/dev/null || true
          7z a "e_foc-simulator-${version}-windows-x86_64.zip" "./staging/simulator/*"
      - name: Package CAN Commander
        shell: bash
        run: |
          version="${{ needs.release_please.outputs.tag_name }}"
          staging="staging/can_commander"
          mkdir -p "$staging"
          find build/source/tool/can_commander -name "e_foc.tool.can_commander.exe" -type f | while read -r f; do
            cp "$f" "$staging/"
          done
          7z a "e_foc-can_commander-${version}-windows-x86_64.zip" "./staging/can_commander/*"
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-simulator
          path: e_foc-simulator-*-windows-x86_64.zip
          if-no-files-found: error
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-can-commander
          path: e_foc-can_commander-*-windows-x86_64.zip
          if-no-files-found: error

  build_embedded:
    name: Build Embedded (${{ matrix.target }})
    needs: [release_please, build_linux_tools]
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ["EK-TM4C1294XL", "EK-TM4C123GXL"]
        configuration: ["RelWithDebInfo"]
        gcc: ["10.3-2021.10"]
    steps:
      - name: Configure Git
        run: |
          git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install GNU Arm Embedded Toolchain ${{ matrix.gcc }}
        uses: carlosperate/arm-none-eabi-gcc-action@2ca034649a66909ef5382c90ffb5d26711d2f266 # v1.12.0
        with:
          release: ${{ matrix.gcc }}
      - run: sudo apt-get update && sudo apt-get install ninja-build xsltproc
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: host-install-package
      - run: tar -zxvf e_foc-*.tar.gz
      - run: mkdir -p install && mv e_foc-*/* install/ || true
      - uses: lukka/run-cmake@af1be47fd7c933593f687731bc6fdbee024d3ff4 # v10.8
        with:
          configurePreset: ${{ matrix.target }}
          buildPreset: ${{ matrix.target }}-${{ matrix.configuration }}
      - name: Package firmware
        run: |
          version="${{ needs.release_please.outputs.tag_name }}"
          staging="staging/${{ matrix.target }}"
          mkdir -p "$staging"
          find "build/${{ matrix.target }}" -name "*.elf" -path "*/${{ matrix.configuration }}/*" -type f | while read -r f; do
            cp "$f" "$staging/"
          done
          tar -czf "e_foc-firmware-${{ matrix.target }}-${version}.tar.gz" -C staging "${{ matrix.target }}"
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: firmware-${{ matrix.target }}
          path: e_foc-firmware-${{ matrix.target }}-*.tar.gz
          if-no-files-found: error

  publish_release_assets:
    name: Publish Release Assets
    needs: [release_please, build_linux_tools, build_windows_tools, build_embedded]
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: release-assets
          merge-multiple: true
      - name: Remove host install package
        run: rm -f release-assets/e_foc-0*.* release-assets/e_foc-*-Linux.*
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ needs.release_please.outputs.tag_name }}"
          for asset in release-assets/*; do
            [ -f "$asset" ] || continue
            echo "Uploading: $asset"
            gh release upload "$tag" "$asset" --repo "$GH_REPO"
          done
