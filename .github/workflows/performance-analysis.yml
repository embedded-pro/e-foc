---
name: Performance Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        type: choice
        options:
          - Debug
          - RelWithDebInfo
        default: Debug

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.ref }}-performance
  cancel-in-progress: true

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 2

jobs:
  cycle_analysis:
    name: Cycle Analysis (${{ matrix.target }} — ${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gcc: ["10.3-2021.10"]
        include:
          - target: EK-TM4C1294XL
            app: sync-foc-sensored-speed
            config-path: .github/actions/cycle-analysis/configs/sync-foc-sensored-speed.json
            elf-path: build/EK-TM4C1294XL/source/application/sync_foc_sensored/speed/main/Debug/e_foc.sync_foc_sensored.speed.main.elf
            configuration: Debug

    steps:
      - name: Configure Git
        run: |
          git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install GNU Arm Embedded Toolchain ${{ matrix.gcc }}
        uses: carlosperate/arm-none-eabi-gcc-action@2ca034649a66909ef5382c90ffb5d26711d2f266 # v1.12.0
        with:
          release: ${{ matrix.gcc }}

      - run: sudo apt-get update && sudo apt-get install -y ninja-build xsltproc

      - uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2.20
        with:
          key: perf-${{ matrix.gcc }}-${{ matrix.target }}
          max-size: 2G
          save: ${{ github.ref == 'refs/heads/main' }}

      - name: Build embedded target
        uses: lukka/run-cmake@af1be47fd7c933593f687731bc6fdbee024d3ff4 # v10.8
        with:
          configurePreset: ${{ matrix.target }}
          buildPreset: ${{ matrix.target }}-${{ matrix.configuration }}
          configurePresetAdditionalArgs: "['-DCMAKE_C_COMPILER_LAUNCHER=ccache', '-DCMAKE_CXX_COMPILER_LAUNCHER=ccache']"

      - name: Run cycle analysis
        uses: ./.github/actions/cycle-analysis
        id: cycles
        with:
          elf-path: ${{ matrix.elf-path }}
          config-path: ${{ matrix.config-path }}
          output-dir: cycle-analysis-output

      - name: Summary
        run: |
          echo "## Cycle Analysis Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Min cycles**: ${{ steps.cycles.outputs.min-cycles }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Max cycles**: ${{ steps.cycles.outputs.max-cycles }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat cycle-analysis-output/cycle_estimation_report.md >> "$GITHUB_STEP_SUMMARY"
