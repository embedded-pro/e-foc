name: 'Generate Traceability Matrix'
description: >
  Generates a requirements-vs-SIL traceability matrix in Markdown by scanning
  YAML requirement files and Gherkin feature files.  Optionally incorporates
  JUnit test results for a pass/fail status column and converts the matrix to
  PDF via Pandoc.

inputs:
  requirements-dir:
    description: 'Directory containing *.yaml requirement files'
    required: false
    default: 'documentation/requirements'
  features-dir:
    description: 'Directory containing *.feature scenario files'
    required: false
    default: 'integration_tests/software_in_the_loop/features'
  junit-xml:
    description: 'Path to JUnit XML from SIL test run (optional; adds status column)'
    required: false
    default: ''
  output:
    description: 'Output path for the generated Markdown file'
    required: true
  pdf-output:
    description: 'If set, also convert the Markdown to a PDF at this path'
    required: false
    default: ''

outputs:
  matrix-path:
    description: 'Path to the generated Markdown traceability matrix'
    value: ${{ inputs.output }}

runs:
  using: 'composite'
  steps:
    - name: Install PyYAML
      shell: bash
      run: pip3 install pyyaml --quiet

    - name: Generate traceability matrix
      shell: bash
      run: |
        python3 "${{ github.action_path }}/generate_traceability_matrix.py" \
          --requirements-dir "${{ inputs.requirements-dir }}" \
          --features-dir     "${{ inputs.features-dir }}" \
          ${{ inputs.junit-xml != '' && format('--junit-xml "{0}"', inputs.junit-xml) || '' }} \
          --output           "${{ inputs.output }}"

    - name: Install Pandoc for PDF conversion
      if: inputs.pdf-output != ''
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          pandoc \
          texlive-latex-recommended \
          texlive-latex-extra \
          texlive-fonts-recommended

    - name: Convert traceability matrix to PDF
      if: inputs.pdf-output != ''
      shell: bash
      run: |
        pandoc \
          --pdf-engine=pdflatex \
          -V geometry:margin=2cm \
          -V fontsize=11pt \
          --toc \
          --standalone \
          -o "${{ inputs.pdf-output }}" \
          "${{ inputs.output }}"
