name: Validate Documents
description: Validates markdown documentation files against architecture and design templates

inputs:
  documents-dir:
    description: Directory to search for documentation files
    required: true
  doc-type:
    description: "Filter by document type: architecture, design, theory, or all"
    required: false
    default: all

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: "3.12"

    - name: Install dependencies
      shell: bash
      run: pip install pyyaml

    - name: Validate documents
      shell: bash
      run: |
        python ${{ github.action_path }}/validate.py \
          --documents-dir "${{ inputs.documents-dir }}" \
          --doc-type "${{ inputs.doc-type }}"
