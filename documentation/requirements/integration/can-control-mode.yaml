- id: REQ-CM-001
  title: SelectControlMode switches the active controller
  shall: >
    When the CAN SelectControlMode command is received, the coordinator shall
    activate the corresponding inner FOC state machine (torque, speed, or position)
    and emit a SelectControlModeResponse on the CAN bus.

- id: REQ-CM-002
  title: SelectControlMode is rejected while motor is enabled
  shall: >
    The coordinator shall reject a SelectControlMode command while the motor is in
    the Enabled state, emit a SelectControlModeResponse with reason busy, and make
    no mode transition.

- id: REQ-CM-003
  title: Selected control mode is persisted across power cycles
  shall: >
    After a successful mode switch, the coordinator shall save the new mode to
    non-volatile memory so that the same mode is restored on the next power cycle.

- id: REQ-CM-004
  title: Typed setpoint is rejected when control mode does not match
  shall: >
    A SetTorqueSetpoint, SetSpeedSetpoint, or SetPositionSetpoint CAN frame shall be
    rejected with a CommandRejected frame (reason: controlModeMismatch) whenever the
    current active mode does not match the type of setpoint command.

- id: REQ-CM-005
  title: Typed setpoint reaches the active controller when mode matches
  shall: >
    A SetSpeedSetpoint, SetTorqueSetpoint, or SetPositionSetpoint CAN frame shall be
    forwarded to the active inner FOC state machine when the current active mode
    matches the type of setpoint command, and no CommandRejected frame shall be emitted.
