- id: REQ-SM-001
  title: Initial state after reset
  shall: >
    On power-on or reset with no valid calibration data in non-volatile storage,
    the state machine shall start in the Idle state.

- id: REQ-SM-002
  title: Calibration transition from Idle
  shall: >
    From the Idle state, when a calibration command is issued, the state machine
    shall transition to the Calibrating state.

- id: REQ-SM-003
  title: Calibration step sequencing
  shall: >
    During calibration, the state machine shall execute steps in the following
    fixed order: pole-pairs estimation, resistance and inductance estimation,
    encoder alignment. Each step shall complete before the next begins.

- id: REQ-SM-004
  title: Calibration success transitions to Ready
  shall: >
    When all calibration steps complete successfully and calibration data is
    saved to non-volatile memory, the state machine shall transition to the
    Ready state.

- id: REQ-SM-005
  title: Calibration failure transitions to Fault
  shall: >
    If any calibration step fails (e.g., pole-pairs estimation returns no result),
    the state machine shall transition to the Fault state with code calibrationFailed.

- id: REQ-SM-006
  title: Ready-to-Enabled transition
  shall: >
    From the Ready state, when an enable command is issued, the state machine
    shall transition to the Enabled state and activate the FOC control loop.

- id: REQ-SM-007
  title: Enabled-to-Ready transition
  shall: >
    From the Enabled state, when a disable command is issued, the state machine
    shall transition back to the Ready state and deactivate the FOC control loop.

- id: REQ-SM-008
  title: Fault transition on hardware fault
  shall: >
    From any non-Fault state, when a hardware fault event is raised via the
    FaultNotifier, the state machine shall immediately transition to the Fault
    state.

- id: REQ-SM-009
  title: Fault clearance transitions to Idle
  shall: >
    From the Fault state, when a clear-fault command is issued, the state machine
    shall transition to the Idle state.

- id: REQ-SM-010
  title: Valid NVM on boot transitions to Ready
  shall: >
    On power-on, if valid calibration data exists in non-volatile storage, the
    state machine shall load that data and transition directly to the Ready state,
    bypassing the Calibrating state.

- id: REQ-SM-011
  title: Calibration data persistence
  shall: >
    Calibration data produced during a successful calibration run shall be saved
    to non-volatile memory so that it survives power cycles.

- id: REQ-SM-012
  title: No heap allocation in state transitions
  shall: >
    All state machine transitions and calibration service calls shall execute
    without dynamic memory allocation.
